<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Assistant</title>
<meta name="theme-color" content="#141218">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Assistant">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<script>
  // Set theme before first paint to avoid a flash.
  document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));
</script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0 auto;
    max-width: 480px;
    padding: 16px;
    background: var(--md-surface);
    color: var(--md-on-surface);
    font-family: var(--md-font);
    -webkit-font-smoothing: antialiased;
  }
  @media (min-width: 768px) { body { max-width: 600px; } }

  .header-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0 4px; }
  h1 { font: var(--md-headline-small); margin: 0; letter-spacing: -0.01em; }
  .subtitle { font: var(--md-body-medium); color: var(--md-on-surface-variant); margin: 0 0 20px; }

  /* .icon-btn defined once in tokens.css */

  /* M3 cards: surface-container, large corners, elevation-1, state layer */
  .card-link {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--md-surface-container);
    border: 1px solid var(--md-outline-variant);
    border-radius: var(--md-shape-lg);
    padding: 16px;
    margin-bottom: 12px;
    text-decoration: none;
    color: var(--md-on-surface);
    box-shadow: var(--md-elev-1);
    transition: box-shadow 0.2s ease, transform 0.15s ease;
  }
  .card-link:hover { box-shadow: var(--md-elev-2); }
  .card-link:active { transform: scale(0.99); }
  .card-link:hover::after, .card-link:active::after,
  .card-link:focus-visible::after { opacity: var(--md-state-hover); }

  .avatar {
    flex: none;
    width: 48px; height: 48px;
    border-radius: var(--md-shape-full);
    background: var(--md-primary-container);
    color: var(--md-on-primary-container);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-link h2 { font: var(--md-title-medium); margin: 0 0 2px; color: var(--md-on-surface); }
  .card-link p { font: var(--md-body-small); margin: 0; color: var(--md-on-surface-variant); }
  .chev { flex: none; color: var(--md-on-surface-variant); }

  .card-link.disabled { opacity: 0.55; pointer-events: none; }
  .card-link.disabled .avatar { background: var(--md-surface-container-high); color: var(--md-on-surface-variant); }

  .badge {
    display: inline-block;
    margin-top: 4px;
    background: color-mix(in srgb, var(--md-warning) 18%, transparent);
    color: var(--md-warning);
    border-radius: var(--md-shape-full);
    padding: 2px 10px;
    font: var(--md-label-small);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
  <header class="header-row">
    <h1>Assistant</h1>
    <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme"></button>
  </header>
  <p class="subtitle">Your little daily helpers.</p>

  <a class="card-link md-state" href="dayplanner/">
    <span class="avatar">🌤️</span>
    <span class="card-body">
      <h2>Office</h2>
      <p>Weather, outfit suggestion, and commute options</p>
    </span>
    <svg class="chev" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
  </a>

  <a class="card-link md-state" href="trip/">
    <span class="avatar">🧳</span>
    <span class="card-body">
      <h2>Trip Outfit</h2>
      <p>Pick a place and dates — get daily weather and what to wear</p>
    </span>
    <svg class="chev" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
  </a>

  <a class="card-link md-state" href="gym/">
    <span class="avatar">🏋️</span>
    <span class="card-body">
      <h2>Gym</h2>
      <p>Workout tracking and routines</p>
      <span class="badge">🚧 Under development</span>
    </span>
    <svg class="chev" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
  </a>

<script>
  var SUN = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
  var MOON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    document.getElementById("themeToggle").innerHTML = t === "light" ? MOON : SUN;
  }
  function toggleTheme() {
    var next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
    localStorage.setItem("theme", next);
    applyTheme(next);
  }
  applyTheme(localStorage.getItem("theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));
  if ("serviceWorker" in navigator) addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
</script>
</body>
</html>
