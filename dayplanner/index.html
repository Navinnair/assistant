<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Office Planner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#091613">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Planner">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="styles.css">
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");</script>
</head>
<body>
  <div class="pull-indicator" id="pullIndicator" aria-hidden="true" style="display:none">↻ Release to refresh</div>
  <div class="leave-bar" id="leaveBar" style="display:none" role="status" onclick="document.getElementById('leaveByCard').scrollIntoView({behavior:'smooth'})"></div>
  <header class="header-row">
    <h1>Office Planner</h1>
    <div class="header-actions">
      <a class="theme-toggle" href="../" title="All apps" aria-label="Back to home page"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></a>
      <button class="theme-toggle" id="refreshBtn" onclick="loadAll()" title="Refresh" aria-label="Refresh data"></button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme"></button>
    </div>
  </header>
  <p class="subtitle" id="dateLine"></p>
  <button class="weather-strip loading" id="weatherStrip" aria-label="Weather summary — tap for hourly" aria-expanded="false" onclick="toggleHourly()">Loading...</button>
  <div class="hourly-wrap" id="hourlyWrap" style="display:none">
    <div id="weather" class="loading">Loading...</div>
  </div>

  <main>
  <div class="dayoff-note" id="dayOffNote" role="status" style="display:none"></div>

  <div class="day-toggle dir-toggle" role="group" aria-label="Direction">
    <button id="btnDirOffice" class="active" onclick="selectDirection('office')" aria-pressed="true"><svg class="btn-ic" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="1"/><path d="M9 7h2M13 7h2M9 11h2M13 11h2M9 15h2M13 15h2"/></svg>To Work</button>
    <button id="btnDirHome" onclick="selectDirection('home')" aria-pressed="false"><svg class="btn-ic" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Going Home</button>
  </div>

  <div class="day-toggle" role="group" aria-label="Day">
    <button id="btnToday" class="active" onclick="selectDay(0)" aria-pressed="true">Today</button>
    <button id="btnTomorrow" onclick="selectDay(1)" aria-pressed="false">Tomorrow</button>
  </div>

  <div class="disruption-banner" id="disruptionBanner" role="alert" style="display:none"></div>

  <section class="card" id="leaveByCard" style="display:none" aria-labelledby="leaveByTitle">
    <h2 id="leaveByTitle">Time to Go</h2>
    <div id="leaveBy" class="loading" aria-live="polite">Loading...</div>
  </section>

  <section class="card" id="outfitCard" aria-labelledby="outfitTitle">
    <h2 id="outfitTitle">Outfit for Today</h2>
    <div id="outfit" class="loading">Loading...</div>
  </section>

  <section class="card" id="routesCard" aria-labelledby="routesTitle">
    <h2 id="routesTitle">To Home (Riesenfeldstr. 10) — Today</h2>
    <div id="routesStale" class="stale-note" style="display:none" aria-live="polite"></div>
    <div id="routesList" class="loading">Loading...</div>
    <div id="routesEmpty" class="loading" style="display:none">No upcoming departures right now.</div>
    <button id="showMoreBtn" class="show-more" style="display:none" onclick="showMoreRoutes()">Show 5 more</button>
  </section>
  </main>

  <p class="updated" id="updated" aria-live="polite"></p>
  <p class="footer-actions"><button class="force-update" onclick="forceUpdate()">↻ Force update (clear cache)</button></p>

  <div class="update-toast" id="updateToast" style="display:none" role="alert">
    <span>New version available</span>
    <button id="updateBtn">Refresh</button>
  </div>

  <div class="hint-toast" id="hintToast" style="display:none" role="status">
    <span>💡 Tap the weather for hourly · swipe to switch · tap a route for the map</span>
    <button id="hintBtn" onclick="dismissHints()">Got it</button>
  </div>

<script src="app.js"></script>
</body>
</html>
