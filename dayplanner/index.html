<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Office Planner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Planner">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header-row">
    <h1>Office Planner</h1>
    <div class="header-actions">
      <button class="theme-toggle" id="refreshBtn" onclick="loadAll()" title="Refresh" aria-label="Refresh"></button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
    </div>
  </div>
  <div class="subtitle" id="dateLine"></div>
  <div class="weather-strip loading" id="weatherStrip">Loading...</div>

  <div class="day-toggle dir-toggle">
    <button id="btnDirHome" onclick="selectDirection('home')">🏠 Home</button>
    <button id="btnDirOffice" class="active" onclick="selectDirection('office')">🏢 Office</button>
  </div>

  <div class="day-toggle">
    <button id="btnToday" class="active" onclick="selectDay(0)">Today</button>
    <button id="btnTomorrow" onclick="selectDay(1)">Tomorrow</button>
  </div>

  <div class="card" id="leaveByCard" style="display:none">
    <h2 id="leaveByTitle">Time to Go</h2>
    <div id="leaveBy" class="loading">Loading...</div>
  </div>

  <div class="card">
    <h2 id="outfitTitle">Outfit for Today</h2>
    <div id="outfit" class="loading">Loading...</div>
  </div>

  <div class="card">
    <h2>Hourly Forecast</h2>
    <div id="weather" class="loading">Loading...</div>
  </div>

  <div class="card">
    <h2 id="routesTitle">To Home (Riesenfeldstr. 10) — Today</h2>
    <div id="routesList" class="loading">Loading...</div>
    <button id="showMoreBtn" class="show-more" style="display:none" onclick="showMoreRoutes()">Show 5 more</button>
  </div>

  <div class="updated" id="updated"></div>

<script src="app.js"></script>
</body>
</html>
